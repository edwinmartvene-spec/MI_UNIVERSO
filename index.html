<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Universo</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
    perspective: 1200px;
  }

  #universe {
    width: 100vw;
    height: 100vh;
    position: relative;
    transform-style: preserve-3d;
  }

  /* Fondo estrellas + nebulosa rosa */
  #space {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at center, #2a0a2a 0%, #000 70%);
  }
  
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 4s infinite;
  }
  .heart-particle {
    position: absolute;
    color: #ff4d8d;
    font-size: 12px;
    animation: floatDown 20s linear infinite;
    opacity: 0.6;
  }

  @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:1} }
  @keyframes floatDown { 
    from { transform: translateY(-100vh) rotate(0deg); } 
    to { transform: translateY(100vh) rotate(360deg); } 
  }

  /* Planeta central */
  #planet {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 180px;
    height: 180px;
    margin: -90px 0 0 -90px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ff8fb5, #ff2d75, #8b0047);
    box-shadow: 
      0 0 60px #ff2d75,
      inset 0 0 80px rgba(255,255,255,0.2);
    transform-style: preserve-3d;
    animation: rotate 30s linear infinite;
  }
  
  #planet::before {
    content: "❤️💖💕💗💓";
    position: absolute;
    width: 100%;
    height: 100%;
    font-size: 25px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    text-align: center;
    line-height: 40px;
    filter: drop-shadow(0 0 5px #fff);
  }

  /* Anillos del planeta */
  .ring {
    position: absolute;
    top: 50%;
    left: 50%;
    border: 2px solid rgba(255, 100, 150, 0.3);
    border-radius: 50%;
    transform: translate(-50%, -50%) rotateX(75deg);
  }
  .ring1 { width: 250px; height: 250px; animation: rotateRing 20s linear infinite; }
  .ring2 { width: 320px; height: 320px; animation: rotateRing 35s linear infinite reverse; }

  @keyframes rotate { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
  @keyframes rotateRing { from { transform: translate(-50%, -50%) rotateX(75deg) rotateZ(0deg); } to { transform: translate(-50%, -50%) rotateX(75deg) rotateZ(360deg); } }

  /* Luna */
  #moon {
    position: absolute;
    top: 10%;
    right: 15%;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ddd, #888);
    box-shadow: 0 0 40px #aaa;
    animation: moonGlow 5s ease-in-out infinite;
  }
  #moon::after {
    content: "💖";
    position: absolute;
    top: 20px;
    left: 25px;
    font-size: 20px;
  }

  @keyframes moonGlow { 0%,100%{box-shadow:0 0 40px #aaa} 50%{box-shadow:0 0 80px #fff} }

  /* Textos orbitando */
  .orbit-text {
    position: absolute;
    color: #ff4d8d;
    font-weight: bold;
    font-size: 16px;
    text-shadow: 0 0 10px #ff2d75, 0 0 20px #ff2d75;
    animation: orbit 25s linear infinite;
    white-space: nowrap;
  }
  
  .orbit-img {
    position: absolute;
    width: 50px;
    height: 50px;
    border-radius: 10px;
    border: 2px solid #ff4d8d;
    box-shadow: 0 0 15px #ff2d75;
    animation: orbit 30s linear infinite;
    object-fit: cover;
  }

  @keyframes orbit {
    from { transform: rotateZ(0deg) translateX(200px) rotateZ(0deg); }
    to { transform: rotateZ(360deg) translateX(200px) rotateZ(-360deg); }
  }

  /* Panel para dedicar */
  #panel {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    gap: 10px;
  }
  input {
    padding: 10px 15px;
    border: 2px solid #ff2d75;
    border-radius: 20px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    outline: none;
    width: 180px;
  }
  button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: #ff2d75;
    color: white;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 15px #ff2d75;
  }
</style>
</head>
<body>

<div id="universe">
  <div id="space"></div>
  <div class="ring ring1"></div>
  <div class="ring ring2"></div>
  <div id="planet"></div>
  <div id="moon"></div>
  <div id="orbit-container"></div>
</div>

<div id="panel">
  <input type="text" id="msg" placeholder="Tu dedicatoria..." value="Te amo">
  <button onclick="addOrbit()">Agregar</button>
</div>

<script>
  const orbitContainer = document.getElementById('orbit-container');
  const frases = ["Te amo", "Mi reina", "Para ti", "Me encantas", "Amor de mi vida", "Mi universo", "Una diosa"];
  
  // 1. Crear estrellas y corazones cayendo
  function createSpace() {
    const space = document.getElementById('space');
    for(let i = 0; i < 150; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.width = star.style.height = Math.random() * 3 + 'px';
      star.style.animationDelay = Math.random() * 4 + 's';
      space.appendChild(star);
    }
    for(let i = 0; i < 30; i++) {
      const heart = document.createElement('div');
      heart.className = 'heart-particle';
      heart.textContent = '💖';
      heart.style.left = Math.random() * 100 + '%';
      heart.style.animationDelay = Math.random() * 20 + 's';
      space.appendChild(heart);
    }
  }

  // 2. Crear textos e imágenes orbitando
  function createOrbit(text, isImg = false, imgSrc = '') {
    const el = document.createElement(isImg ? 'img' : 'div');
    if(isImg) {
      el.className = 'orbit-img';
      el.src = imgSrc;
    } else {
      el.className = 'orbit-text';
      el.textContent = text;
    }
    
    el.style.top = '50%';
    el.style.left = '50%';
    el.style.animationDelay = -Math.random() * 30 + 's';
    el.style.animationDuration = (Math.random() * 15 + 20) + 's';
    
    orbitContainer.appendChild(el);
  }

  // 3. Botón para agregar tu frase
  function addOrbit() {
    const msg = document.getElementById('msg').value;
    if(msg.trim() !== "") {
      createOrbit(msg);
      document.getElementById('msg').value = "";
    }
  }

  // Iniciar universo
  createSpace();
  frases.forEach(f => createOrbit(f));
  
  // Agregar 4 fotitos de ejemplo, puedes cambiar los links
  const imgs = [
    "https://i.imgur.com/4L7A6sK.png",
    "https://i.imgur.com/8QfWq1m.png",
    "https://i.imgur.com/1j7kX2p.png",
    "https://i.imgur.com/9yZ4a5c.png"
  ];
  imgs.forEach(src => createOrbit('', true, src));

  document.getElementById('msg').addEventListener('keypress', e => {
    if(e.key === 'Enter') addOrbit();
  });
</script>

</body>
</html>
